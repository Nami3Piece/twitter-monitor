name: Deploy to Aliyun Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # IMPORTANT: Two paths must BOTH be updated
          # /opt/twitter-monitor  — systemd service WorkingDirectory (actual running process)
          # /var/www/twitter-monitor — secondary path (keep in sync)

          cd /opt/twitter-monitor && sudo git pull origin main
          cd /var/www/twitter-monitor && sudo git pull origin main

          # Kill old process on port 8080 and restart service
          sudo fuser -k 8080/tcp 2>/dev/null || true
          sleep 1
          sudo systemctl restart twitter-monitor-web

          echo "✅ Deploy complete — both paths updated"
